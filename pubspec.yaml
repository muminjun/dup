name: dup
description: "A powerful, flexible schema-based validation library for Dart, inspired by JavaScript's yup."
version: 2.0.0
homepage: https://github.com/muminjun/dup
repository: https://github.com/muminjun/dup

environment:
  # ^3.0.0 covers all sealed-class / switch-expression requirements; no Dart 3.7+ APIs are used,
  # so we intentionally keep the constraint broad to maximise consumer compatibility.
  sdk: ^3.0.0

dependencies:
  meta: ^1.9.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
